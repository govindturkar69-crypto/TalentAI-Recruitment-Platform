{% extends "base.html" %}
{% block title %}Edit Job{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div style="font-size:2.5rem">✏️</div>
          <h3 class="fw-bold">Edit Job</h3>
          <p class="text-muted small">Update the details for "{{ job.job_title }}"</p>
        </div>

        <form method="POST" action="{{ url_for('edit_job', job_id=job.id) }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Job Title *</label>
            <input type="text" name="job_title" class="form-control" value="{{ job.job_title }}" required>
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Required Skills * <small class="text-muted">(comma separated)</small></label>
            <input type="text" name="required_skills" class="form-control" value="{{ job.required_skills }}">
          </div>

          <div class="mb-3">
            <label class="form-label fw-semibold">Job Description</label>
            <textarea name="description" class="form-control" rows="4">{{ job.description or '' }}</textarea>
          </div>

          <div class="row g-3 mb-4">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Location</label>
              <input type="text" name="location" class="form-control" value="{{ job.location or '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Experience Required</label>
              <select name="experience" class="form-select">
                {% for exp in ["Fresher", "1-2 years", "2-4 years", "4-6 years", "6+ years"] %}
                  <option value="{{ exp }}" {% if job.experience == exp %}selected{% endif %}>{{ exp }}</option>
                {% endfor %}
              </select>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-fill py-2 fw-bold">
              <i class="bi bi-check-circle"></i> Save Changes
            </button>
            <a href="{{ url_for('recruiter_dashboard') }}" class="btn btn-outline-secondary py-2">
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
