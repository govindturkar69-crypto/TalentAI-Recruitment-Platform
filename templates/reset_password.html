{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card auth-card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div style="font-size:2.5rem">🔒</div>
          <h3 class="fw-bold mt-2">Set a New Password</h3>
          <p class="text-muted small">Choose a strong password for your account</p>
        </div>

        <form method="POST" action="{{ url_for('reset_password', token=token) }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">New Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" minlength="6" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Confirm New Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter password" minlength="6" required>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            <i class="bi bi-check-circle"></i> Reset Password
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
