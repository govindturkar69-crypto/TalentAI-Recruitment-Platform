{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card auth-card shadow-sm border-0">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div style="font-size:2.5rem">🔐</div>
          <h3 class="fw-bold mt-2">Login to Your Account</h3>
          <p class="text-muted small">Enter your credentials to continue</p>
        </div>

        <form method="POST" action="{{ url_for('login') }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input type="email" name="email" class="form-control" placeholder="your@email.com" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="text-end mt-1">
              <a href="{{ url_for('forgot_password') }}" class="small text-decoration-none">Forgot password?</a>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
            <i class="bi bi-box-arrow-in-right"></i> Login
          </button>
        </form>

        <hr class="my-3">
        <p class="text-center text-muted small mb-0">
          Don't have an account?
          <a href="{{ url_for('register') }}" class="text-decoration-none fw-bold">Register here</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
